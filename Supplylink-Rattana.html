<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SupplyLink Rattana v3.0</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ========================================================
   SupplyLink Rattana v2 — Theme
   Navy #1B2B5E · Gold #C9A84C · White
   Text on navy: #E4EBF7 (WCAG AA, ~9:1)
   ======================================================== */
:root{
  --navy:#1B2B5E; --navy-dark:#0F1A3E; --navy-mid:#26397A; --navy-light:#3C5199;
  --gold:#C9A84C; --gold-light:#E0C170; --gold-dark:#A88836;
  --white:#FFFFFF; --off-white:#F5F7FB; --bg:#EFF2F8;
  --text:#1A1F2E; --text-soft:#5A6478; --text-mute:#8892A6;
  --on-navy:#E4EBF7; --on-navy-dim:#A9B6D4;
  --card:#FFFFFF; --border:#DDE3F0; --border-strong:#C2CCDE;
  --success:#22A06B; --warning:#E69500; --danger:#D14343; --info:#2A7FC5;
  --success-bg:#E8F5EE; --warning-bg:#FFF4E0; --danger-bg:#FBE8E8; --info-bg:#E6F1FA;
  --shadow-sm:0 1px 2px rgba(15,26,62,.06);
  --shadow:0 2px 8px rgba(15,26,62,.10);
  --shadow-lg:0 8px 24px rgba(15,26,62,.18);
  --radius:10px; --radius-sm:6px; --radius-lg:14px;
  --sidebar-w:248px;
  --header-h:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Sarabun','Segoe UI',sans-serif;
  background:var(--bg); color:var(--text);
  font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100dvh;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:var(--info);text-decoration:none}
a:hover{text-decoration:underline}

/* ====================== Utility ====================== */
.hidden{display:none !important}
.txt-center{text-align:center}
.txt-right{text-align:right}
.txt-soft{color:var(--text-soft)}
.txt-mute{color:var(--text-mute)}
.txt-small{font-size:13px}
.txt-bold{font-weight:700}
.flex{display:flex;gap:12px;align-items:center}
.flex-between{display:flex;gap:12px;align-items:center;justify-content:space-between}
.flex-wrap{flex-wrap:wrap}
.grid{display:grid;gap:16px}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}

/* ====================== Buttons ====================== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 18px;min-height:42px;border-radius:var(--radius);
  font-weight:600;font-size:14px;line-height:1.2;
  transition:all .15s; user-select:none;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover:not(:disabled){background:var(--navy-mid)}
.btn-gold{background:var(--gold);color:var(--navy-dark);font-weight:700}
.btn-gold:hover:not(:disabled){background:var(--gold-light)}
.btn-ghost{background:transparent;color:var(--navy);border:1px solid var(--border-strong)}
.btn-ghost:hover:not(:disabled){background:var(--off-white);border-color:var(--navy)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover:not(:disabled){background:#B83636}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover:not(:disabled){background:#1A8555}
.btn:disabled{opacity:.55;cursor:not-allowed}
.btn-sm{padding:6px 12px;min-height:32px;font-size:13px}
.btn-lg{padding:14px 28px;min-height:50px;font-size:16px}
.btn-icon{min-width:42px;padding:10px}
.btn-block{width:100%}

/* ====================== Login Screen ====================== */
.login-wrap{
  min-height:100dvh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 60%,var(--navy-mid) 100%);
  padding:20px;position:relative;overflow:hidden;
}
.login-wrap::before{
  content:"";position:absolute;inset:-50%;
  background:radial-gradient(circle at 30% 20%,rgba(201,168,76,.10),transparent 50%),
             radial-gradient(circle at 70% 80%,rgba(201,168,76,.06),transparent 40%);
  animation:driftBg 30s infinite alternate;
}
@keyframes driftBg{to{transform:translate(20px,-20px)}}
.login-card{
  position:relative;width:100%;max-width:440px;background:var(--white);
  border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);
  overflow:hidden;animation:floatIn .5s ease-out;
}
@keyframes floatIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.login-head{background:var(--navy);color:#fff;padding:28px 32px;text-align:center;border-bottom:4px solid var(--gold)}
.login-logo{
  width:70px;height:70px;margin:0 auto 12px;border-radius:50%;
  background:var(--gold);color:var(--navy-dark);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:800;letter-spacing:-1px;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
}
.login-head h1{font-size:22px;font-weight:700;letter-spacing:.3px}
.login-head p{color:var(--on-navy);font-size:13px;margin-top:4px}
.login-body{padding:24px 32px 32px}
.tab-bar{display:flex;background:var(--off-white);border-radius:var(--radius);padding:4px;margin-bottom:20px}
.tab-btn{flex:1;padding:10px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;color:var(--text-soft);transition:all .15s}
.tab-btn.active{background:var(--white);color:var(--navy);box-shadow:var(--shadow-sm)}

/* ====================== Form ====================== */
.form-group{margin-bottom:16px}
.form-label{display:block;font-weight:600;font-size:14px;margin-bottom:6px;color:var(--text)}
.form-label .req{color:var(--danger)}
.form-input,.form-select,.form-textarea{
  width:100%;padding:11px 14px;border:1px solid var(--border-strong);border-radius:var(--radius);
  background:var(--white);color:var(--text);font-size:16px;
  transition:border-color .15s,box-shadow .15s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,43,94,.12);
}
.form-textarea{resize:vertical;min-height:80px}
.form-hint{font-size:12px;color:var(--text-soft);margin-top:4px}
.form-error{font-size:13px;color:var(--danger);margin-top:4px;display:flex;gap:4px;align-items:center}

/* ====================== App Layout ====================== */
.app{display:flex;min-height:100dvh}
.sidebar{
  width:var(--sidebar-w);background:var(--navy);color:var(--on-navy);
  position:fixed;top:0;left:0;height:100dvh;z-index:80;
  display:flex;flex-direction:column;transition:transform .25s;
}
.sb-head{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
.sb-logo{width:42px;height:42px;border-radius:50%;background:var(--gold);color:var(--navy-dark);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;flex-shrink:0}
.sb-brand{line-height:1.2}
.sb-brand b{color:#fff;font-size:15px;font-weight:700;letter-spacing:.3px}
.sb-brand small{color:var(--on-navy-dim);font-size:12px}
.sb-nav{flex:1;overflow-y:auto;padding:12px 10px;-webkit-overflow-scrolling:touch}
.sb-section{padding:10px 12px 4px;font-size:11px;font-weight:700;color:var(--on-navy-dim);letter-spacing:.8px;text-transform:uppercase}
.sb-item{
  display:flex;align-items:center;gap:12px;padding:11px 14px;
  color:var(--on-navy);font-weight:500;font-size:14px;
  border-radius:var(--radius-sm);transition:all .15s;
  border:none;width:100%;text-align:left;background:none;cursor:pointer;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-item.active{background:var(--gold);color:var(--navy-dark);font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.sb-item .ico{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.sb-foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.15)}
.sb-user{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-avatar{width:36px;height:36px;border-radius:50%;background:var(--gold-dark);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.sb-user-info{line-height:1.3;overflow:hidden}
.sb-user-info b{color:#fff;font-size:13px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-user-info small{color:var(--on-navy-dim);font-size:11px}

.main{flex:1;margin-left:var(--sidebar-w);display:flex;flex-direction:column;min-width:0}
.topbar{
  height:var(--header-h);background:var(--white);border-bottom:1px solid var(--border);
  padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:30;box-shadow:var(--shadow-sm);
}
.topbar-title{font-size:18px;font-weight:700;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.hamburger{display:none;background:var(--off-white);width:40px;height:40px;border-radius:var(--radius-sm);align-items:center;justify-content:center;font-size:20px;color:var(--navy)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(15,26,62,.55);z-index:79;backdrop-filter:blur(2px)}

.content{flex:1;padding:24px;max-width:100%;overflow-x:hidden}

/* ====================== Cards ====================== */
.card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow-sm);border:1px solid var(--border);
  overflow:hidden;
}
.card-gold{border-top:3px solid var(--gold)}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.card-head h3{font-size:16px;font-weight:700;color:var(--navy);display:flex;align-items:center;gap:8px}
.card-body{padding:20px}
.card-body.no-pad{padding:0}
.card-foot{padding:14px 20px;background:var(--off-white);border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat{background:var(--card);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow-sm);border:1px solid var(--border);border-left:4px solid var(--gold);position:relative;overflow:hidden}
.stat .lbl{font-size:13px;color:var(--text-soft);font-weight:500;margin-bottom:6px}
.stat .val{font-size:30px;font-weight:800;color:var(--navy);line-height:1.1}
.stat .sub{font-size:12px;color:var(--text-mute);margin-top:4px}
.stat.s-info{border-left-color:var(--info)}
.stat.s-success{border-left-color:var(--success)}
.stat.s-warning{border-left-color:var(--warning)}
.stat.s-danger{border-left-color:var(--danger)}

/* ====================== Table ====================== */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:14px;min-width:560px}
.tbl th,.tbl td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl thead th{background:var(--off-white);color:var(--navy);font-weight:700;font-size:13px;white-space:nowrap;letter-spacing:.2px;position:sticky;top:0}
.tbl tbody tr{transition:background .1s}
.tbl tbody tr:hover{background:var(--off-white)}
.tbl td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.tbl td.actions{white-space:nowrap;text-align:right}

/* Badges */
.badge{
  display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:999px;font-size:12px;font-weight:600;line-height:1.5;
  white-space:nowrap;
}
.badge-info{background:var(--info-bg);color:var(--info)}
.badge-success{background:var(--success-bg);color:var(--success)}
.badge-warning{background:var(--warning-bg);color:var(--warning)}
.badge-danger{background:var(--danger-bg);color:var(--danger)}
.badge-navy{background:#E4EBF7;color:var(--navy)}
.badge-gold{background:#FAF1D7;color:var(--gold-dark)}
.badge-mute{background:#F0F2F5;color:var(--text-soft)}

/* Empty state */
.empty{
  text-align:center;padding:48px 24px;color:var(--text-soft);
}
.empty .empty-ico{font-size:42px;margin-bottom:8px;opacity:.5}
.empty h4{color:var(--navy);font-size:16px;font-weight:700;margin-bottom:4px}
.empty p{font-size:14px}

/* Skeleton */
.skel{background:linear-gradient(90deg,#eef1f8,#dde3f0,#eef1f8);background-size:200% 100%;border-radius:var(--radius-sm);animation:skelShine 1.3s infinite linear}
@keyframes skelShine{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-row{height:44px;margin:8px 0}
.skel-card{height:100px}

/* Overlay spinner */
.overlay{position:fixed;inset:0;z-index:200;background:rgba(15,26,62,.35);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0}}
.overlay-box{background:#fff;padding:24px 32px;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);border-top:3px solid var(--gold);text-align:center;min-width:200px}
.overlay-spinner{width:42px;height:42px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.overlay-msg{color:var(--navy);font-weight:600;font-size:14px}

/* Toast */
#toastBox{position:fixed;top:20px;right:20px;z-index:500;display:flex;flex-direction:column;gap:10px;max-width:calc(100% - 40px)}
.toast{
  background:#fff;border-left:4px solid var(--navy);padding:12px 18px;
  border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);
  font-size:14px;font-weight:500;min-width:240px;max-width:360px;
  display:flex;align-items:center;gap:10px;
  animation:toastIn .25s ease-out;
}
.toast.success{border-left-color:var(--success);color:var(--success)}
.toast.error{border-left-color:var(--danger);color:var(--danger)}
.toast.warning{border-left-color:var(--warning);color:var(--warning)}
.toast.info{border-left-color:var(--info);color:var(--info)}
.toast .t-ico{font-size:18px;flex-shrink:0}
.toast .t-msg{color:var(--text);flex:1;line-height:1.4}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:none;opacity:1}}

/* Modal */
.modal-backdrop{position:fixed;inset:0;background:rgba(15,26,62,.55);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .15s;overflow-y:auto}
.modal{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);max-width:560px;width:100%;max-height:90dvh;display:flex;flex-direction:column;animation:modalIn .22s ease-out;border-top:4px solid var(--gold)}
@keyframes modalIn{from{transform:translateY(16px);opacity:0}to{transform:none;opacity:1}}
.modal.modal-lg{max-width:760px}.modal.modal-xl{max-width:960px}
.modal-head{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.modal-head h3{color:var(--navy);font-weight:700;font-size:17px}
.modal-body{padding:20px 24px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 24px;border-top:1px solid var(--border);background:var(--off-white);display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap;border-radius:0 0 var(--radius-lg) var(--radius-lg)}
.modal-close{background:var(--off-white);width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-soft)}
.modal-close:hover{background:var(--border)}

/* ====================== Booking Wizard ====================== */
.wiz-steps{display:flex;margin-bottom:24px;gap:4px;overflow-x:auto}
.wiz-step{
  flex:1;padding:14px 10px;border-radius:var(--radius-sm);
  background:var(--off-white);color:var(--text-soft);
  text-align:center;font-weight:600;font-size:13px;
  position:relative;min-width:90px;
  border:1px solid var(--border);
}
.wiz-step.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.wiz-step.done{background:var(--gold-light);color:var(--navy-dark);border-color:var(--gold)}
.wiz-step .num{display:inline-block;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.2);line-height:22px;margin-right:6px;font-size:12px;font-weight:700}
.wiz-step.active .num{background:var(--gold)}
.wiz-step.done .num{background:var(--navy);color:#fff}
.wiz-step:not(.active):not(.done) .num{background:var(--border-strong);color:#fff}

/* PO chooser grid */
.po-grid{display:grid;gap:10px;grid-template-columns:1fr}
.po-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:14px;border:2px solid var(--border);border-radius:var(--radius);
  background:#fff;cursor:pointer;transition:all .15s;
}
.po-item:hover{border-color:var(--navy-light);background:var(--off-white)}
.po-item.selected{border-color:var(--gold);background:#FFF9E8}
.po-item input[type="checkbox"]{width:18px;height:18px;margin-top:2px;accent-color:var(--gold)}
.po-item .po-info{flex:1;min-width:0}
.po-item .po-id{font-weight:700;color:var(--navy);font-size:14px}
.po-item .po-sup{font-size:13px;color:var(--text)}
.po-item .po-meta{font-size:12px;color:var(--text-soft);margin-top:4px;display:flex;gap:10px;flex-wrap:wrap}

/* Warehouse cards */
.wh-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
.wh-card{
  padding:18px;border:2px solid var(--border);border-radius:var(--radius);
  background:#fff;cursor:pointer;transition:all .15s;text-align:center;
}
.wh-card:hover{border-color:var(--navy-light);transform:translateY(-2px);box-shadow:var(--shadow)}
.wh-card.selected{border-color:var(--gold);background:#FFF9E8;box-shadow:var(--shadow)}
.wh-card .wh-ico{font-size:32px;margin-bottom:6px}
.wh-card .wh-name{font-weight:700;color:var(--navy);font-size:15px}
.wh-card .wh-code{font-size:12px;color:var(--text-soft);margin-top:2px}
.wh-card.wh-shipto{border-style:dashed}
.wh-card.wh-shipto.selected{border-style:solid}

/* Time slot grid */
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px}
.slot{padding:10px 6px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;text-align:center;font-weight:600;font-size:14px;color:var(--navy);cursor:pointer;transition:all .12s}
.slot:hover:not(.disabled){border-color:var(--navy);background:var(--off-white)}
.slot.selected{background:var(--gold);border-color:var(--gold-dark);color:var(--navy-dark);font-weight:700}
.slot.disabled{background:#F5F7FB;color:var(--text-mute);cursor:not-allowed;text-decoration:line-through;opacity:.7}
.slot .t-by{display:block;font-size:10px;font-weight:400;margin-top:2px;color:var(--text-mute)}

/* ====================== Calendar ====================== */
.cal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.cal-head h3{font-size:18px;font-weight:700;color:var(--navy)}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;min-width:560px}
.cal-day-name{text-align:center;font-weight:700;font-size:12px;color:var(--text-soft);padding:8px 4px;background:var(--off-white);border-radius:var(--radius-sm)}
.cal-day{
  min-height:82px;background:#fff;border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:6px;font-size:12px;position:relative;
}
.cal-day.other{background:var(--off-white);color:var(--text-mute)}
.cal-day.today{border-color:var(--gold);border-width:2px}
.cal-day.holiday{background:#FBE8E8}
.cal-day.sunday{background:#F5F7FB;color:var(--text-mute)}
.cal-day .d-num{font-weight:700;color:var(--navy);font-size:13px}
.cal-day.other .d-num{color:var(--text-mute)}
.cal-day .d-evt{
  display:block;padding:2px 5px;margin-top:3px;border-radius:3px;
  background:var(--navy);color:#fff;font-size:10px;font-weight:600;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;
}
.cal-day .d-evt.w-W1{background:#2A7FC5}
.cal-day .d-evt.w-W2{background:#22A06B}
.cal-day .d-evt.w-W3{background:#8E44AD}
.cal-day .d-evt.w-W4{background:#1B2B5E}
.cal-day .d-evt.w-SM{background:var(--gold-dark)}
.cal-day .d-evt.cancelled{background:var(--text-mute);text-decoration:line-through}

/* Account picker */
.acc-list{display:flex;flex-direction:column;gap:10px}
.acc-item{padding:14px;border:2px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;background:#fff}
.acc-item:hover{border-color:var(--navy-light);background:var(--off-white)}
.acc-item.selected{border-color:var(--gold);background:#FFF9E8}
.acc-item .ac-code{font-weight:700;color:var(--navy);font-size:14px}
.acc-item .ac-name{font-size:13px;color:var(--text);margin-top:2px}

/* Vendor master detail */
.vm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px 20px}
.vm-field{padding:8px 0;border-bottom:1px dashed var(--border)}
.vm-field .lbl{font-size:12px;color:var(--text-soft);font-weight:500;margin-bottom:2px}
.vm-field .val{font-size:14px;color:var(--text);font-weight:500;word-break:break-word}

/* ====================== Bar Chart (admin dashboard) ====================== */
.bar-chart-wrap{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch}
.bar-chart{display:flex;gap:8px;align-items:flex-end;height:130px;min-width:280px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;min-width:36px}
.bar-col .bc-val{font-size:11px;font-weight:700;color:var(--navy);margin-bottom:3px}
.bar-col .bc-bar{width:100%;border-radius:4px 4px 0 0;min-height:2px;transition:height .3s}
.bar-col .bc-lbl{font-size:10px;color:var(--text-soft);text-align:center;margin-top:4px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

/* Dashboard chart row */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:640px){.chart-row{grid-template-columns:1fr}}

/* ====================== Mobile responsive grid 2-col ====================== */
.grid-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.grid-2col{grid-template-columns:1fr}}

/* ====================== GR filter panel ====================== */
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;padding:16px;background:var(--off-white);border-bottom:1px solid var(--border)}
.filter-field{display:flex;flex-direction:column;gap:4px}
.filter-field label{font-size:12px;font-weight:600;color:var(--text-soft)}
.filter-field input,.filter-field select{padding:8px 10px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);font-size:14px;background:#fff;color:var(--text);min-height:38px}
.filter-field input:focus,.filter-field select:focus{outline:none;border-color:var(--navy)}

/* ====================== Responsive ====================== */
@media (max-width:768px){
  .sidebar{transform:translateX(-100%);box-shadow:var(--shadow-lg)}
  .sidebar.open{transform:none}
  .main{margin-left:0}
  .hamburger{display:flex}
  .sidebar-overlay.open{display:block}
  .content{padding:12px}
  .topbar{padding:0 12px}
  .topbar-title{font-size:15px}
  .card-body{padding:14px}
  .card-head{padding:12px 14px;gap:8px}
  .card-head h3{font-size:14px}
  .stat .val{font-size:22px}
  .stat{padding:14px 16px}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
  .cal{min-width:100%}
  .cal-day{min-height:52px;padding:3px}
  .cal-day .d-num{font-size:11px}
  .cal-day .d-evt{font-size:9px;padding:1px 3px}
  .po-grid{grid-template-columns:1fr}
  .wh-grid{grid-template-columns:repeat(2,1fr)}
  .wh-card{padding:12px}
  .wh-card .wh-ico{font-size:24px}
  .wiz-step{font-size:11px;padding:8px 4px;min-width:64px}
  .wiz-step .num{width:17px;height:17px;line-height:17px;font-size:10px;margin-right:3px}
  .modal{max-height:96dvh;border-radius:var(--radius) var(--radius) 0 0}
  .modal-body{padding:14px}
  .modal-foot{padding:12px 14px}
  #toastBox{top:10px;right:10px;left:10px}
  .toast{min-width:0;max-width:100%;font-size:13px}
  /* Filter bar wraps to 2 cols on mobile */
  .filter-bar{gap:8px}
  .filter-field{flex:1 1 calc(50% - 8px);min-width:120px}
  .filter-field input,.filter-field select{font-size:14px}
  /* Bar chart smaller on mobile */
  .bar-chart{height:100px}
  .bar-col .bc-val{font-size:10px}
  .bar-col .bc-lbl{font-size:9px}
  /* Slot grid tighter on mobile */
  .slot-grid{grid-template-columns:repeat(auto-fill,minmax(78px,1fr));gap:6px}
  .slot{padding:8px 4px;font-size:13px}
}
@media (max-width:400px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .wiz-step{font-size:10px;padding:7px 3px;min-width:56px}
  .wiz-steps{gap:2px}
  .wh-grid{grid-template-columns:repeat(2,1fr)}
}
@media (min-width:769px){
  .po-grid{grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
}
</style>

<body>

<!-- ====================== LOGIN SCREEN ====================== -->
<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="login-head">
      <div class="login-logo">SR</div>
      <h1>SupplyLink Rattana</h1>
      <p>ระบบจัดการรับสินค้า</p>
    </div>
    <div class="login-body">
      <div class="tab-bar">
        <button type="button" class="tab-btn active" data-tab="staff" onclick="switchTab('staff')">เจ้าหน้าที่</button>
        <button type="button" class="tab-btn" data-tab="supplier" onclick="switchTab('supplier')">ผู้ขาย (Supplier)</button>
      </div>

      <!-- Staff login (Google Sign-In) -->
      <div id="staffForm">
        <p class="txt-small txt-soft mb-16 txt-center">เข้าสู่ระบบด้วยบัญชี Google ของบริษัท Rattana</p>
        <div id="g_id_onload"
             data-client_id="615875645128-gasjjvkt6lu8g449cbnhl40k1pu25r0b.apps.googleusercontent.com"
             data-callback="handleGoogleLogin"
             data-auto_prompt="false"
             data-ux_mode="popup"
             data-itp_support="true"></div>
        <div class="g_id_signin" style="display:flex;justify-content:center"
             data-type="standard"
             data-size="large"
             data-theme="outline"
             data-text="signin_with"
             data-shape="rectangular"
             data-logo_alignment="left"
             data-width="340"></div>
        <div class="form-error hidden mt-16" id="staffErr"></div>

          <p class="form-hint">กรอกเบอร์โทรที่ลงทะเบียนไว้กับฝ่ายจัดซื้อ</p>

        <div class="form-error hidden" id="supErr"></div>
        <button type="submit" class="btn btn-gold btn-lg btn-block" id="supBtn">
          <span>เข้าสู่ระบบด้วยเบอร์โทร</span>

<!-- ====================== APP SHELL ====================== -->
<div id="appShell" class="app hidden">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar(false)"></div>

  <aside class="sidebar" id="sidebar">

<!-- Global overlays -->
<div id="overlayBox" class="hidden"></div>
<div id="modalHost" class="hidden"></div>
<div id="toastBox"></div>

<script>
/* ===============================================================
   SupplyLink Rattana v2 — Frontend
   =============================================================== */

/* ----- CONSTANTS ------------------------------------------------ */
const WH_ICONS = {W1:'🏭', W2:'🏗️', W3:'🏪', W4:'🏬', SM:'🚚'};
const WH_COLORS = {W1:'#2A7FC5', W2:'#22A06B', W3:'#8E44AD', W4:'#1B2B5E', SM:'#A88836'};
const THAI_MONTHS = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const THAI_DAYS_SHORT = ['อา','จ','อ','พ','พฤ','ศ','ส'];
const CACHE_KEYS = {WAREHOUSES:'sl_warehouses', HOLIDAYS:'sl_holidays', PALETTES:'sl_palettes'};
const STORAGE_KEY = 'supplylink_rattana_session';

/* ----- APP STATE ----------------------------------------------- */
const state = {
  token: null,
  role: null,
  name: null,
  phone: null,
  accounts: [],                 /* supplier-only: matched supplier codes */
  selectedAccount: 'ALL',       /* 'ALL' or specific supplier code */
  currentPage: null,

  /* bootstrap cache */
  user: null,
  today: null,
  holidays: [],
  palettes: [],
  warehouses: [],
  stats: {},
  appointments: [],
  pos: [],

  /* lazy-loaded */
  grRecords: null,
  grHeaders: null,
  customColumns: null,
  users: null,
  vendorMaster: null,

  /* calendar month */
  calYear: null, calMonth: null,

  /* booking wizard */
  wizStep: 1,
  wizPOs: [],          /* selected PO ids */
  wizPOSearch: '',     /* PO search text in wizard step 1 */
  wizWarehouse: null,
  wizDate: null,
  wizTime: null,
  wizNote: '',
  wizAdmin: null,      /* admin booking: {supplierCode, supplierName} */
};

/* ----- API (Promise wrapper for google.script.run) ------------ */
function callAPI(method, ...args){
  return new Promise((resolve,reject)=>{
    if(typeof google === 'undefined' || !google.script || !google.script.run){
      return reject(new Error('google.script.run not available'));
    }
    google.script.run
      .withSuccessHandler(resolve)
      .withFailureHandler(e=>reject(new Error(e && e.message ? e.message : String(e))))
      [method](...args);
  });
}

/* ----- UTIL ---------------------------------------------------- */
const $ = (id)=>document.getElementById(id);
const esc = (s)=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pad = (n)=>String(n).padStart(2,'0');
const fmtISO = (d)=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const toBE = (y)=>Number(y)+543;   /* Buddhist Era */
function fmtThaiDate(iso, opts){
  if(!iso) return '-';
  const [y,m,d]=String(iso).substring(0,10).split('-').map(Number);
  if(!y||!m||!d) return iso;
  /* {long:true} = verbose: "25 เมษายน 2569" (for modals/summaries) */
  if(opts && opts.long) return d+' '+THAI_MONTHS[m-1]+' '+toBE(y);
  /* default = compact Thai: 25/04/2569 */
  return pad(d)+'/'+pad(m)+'/'+toBE(y);
}
function fmtDateTime(s){
  if(!s) return '-';
  try{
    const d=new Date(s);
    if(isNaN(d.getTime())) return s;
    return fmtThaiDate(fmtISO(d))+' '+pad(d.getHours())+':'+pad(d.getMinutes())+' น.';
  }catch(e){ return s; }
}
/* Format HH:MM string → "HH:MM น." */
function fmtSlot(t){ return t ? t+' น.' : '-'; }
function numFmt(n){ return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:2}); }
function getInitial(name){ const s=String(name||'?').trim(); return s? s.substring(0,1).toUpperCase() : 'U'; }
function roleLabel(r){ return ({admin:'ผู้ดูแลระบบ', gr:'ทีม GR', supplier:'ผู้ขาย (Supplier)'})[r] || r; }
function whName(code){ const w=(state.warehouses||[]).find(x=>x.code===code); return w? w.name : code; }
function whIcon(code){ return WH_ICONS[code] || '📦'; }

/* cache helpers (sessionStorage for small static lookups) */
function cacheSet(key,data){ try{ sessionStorage.setItem(key, JSON.stringify({data,ts:Date.now()})); }catch(_){} }
function cacheGet(key,maxAgeMs){ try{ const raw=sessionStorage.getItem(key); if(!raw) return null; const obj=JSON.parse(raw); if(maxAgeMs && Date.now()-obj.ts>maxAgeMs) return null; return obj.data; }catch(_){ return null; } }

/* session persistence (localStorage) — allows browser restart without re-login */
function persistSession(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      token: state.token,
      selectedAccount: state.selectedAccount,
      savedAt: Date.now()
    }));
  }catch(_){}
}
function clearSession(){ try{ localStorage.removeItem(STORAGE_KEY); }catch(_){} }
async function tryResumeSession(){
  let saved = null;
  try{ saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null'); }catch(_){}
  if(!saved || !saved.token) return false;
  state.token = saved.token;
  if(saved.selectedAccount) state.selectedAccount = saved.selectedAccount;
  /* silent: don't show toast if token is expired — just fall through to login */
  const ok = await loadBootstrap(true);
  if(!ok){ clearSession(); return false; }
  $('loginScreen').classList.add('hidden');
  $('appShell').classList.remove('hidden');
  buildSidebar();
  updateUserChip();
  navigate(defaultPage());
  return true;
}

/* ----- TOAST / OVERLAY / MODAL -------------------------------- */
function toast(msg, type){
  const t = document.createElement('div');
  t.className = 'toast '+(type||'info');
  const icons = {success:'✓', error:'✕', warning:'⚠', info:'ℹ'};
  t.innerHTML = '<span class="t-ico">'+(icons[type]||'ℹ')+'</span><span class="t-msg">'+esc(msg)+'</span>';
  $('toastBox').appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity .3s,transform .3s'; t.style.opacity='0'; t.style.transform='translateX(40px)'; setTimeout(()=>t.remove(),300); },3500);
}
function showOverlay(msg){
  const box = $('overlayBox');
  box.className = 'overlay';
  box.innerHTML = '<div class="overlay-box"><div class="overlay-spinner"></div><div class="overlay-msg">'+esc(msg||'กำลังโหลด...')+'</div></div>';
}
function hideOverlay(){ const box=$('overlayBox'); box.className='hidden'; box.innerHTML=''; }
function showModal({title, body, size, footer}){
  const host = $('modalHost');
  host.className = 'modal-backdrop';
  host.innerHTML = `
    <div class="modal ${size==='lg'?'modal-lg':size==='xl'?'modal-xl':''}">
      <div class="modal-head">
        <h3>${esc(title||'')}</h3>
        <button class="modal-close" onclick="closeModal()" aria-label="Close">×</button>
      </div>
      <div class="modal-body">${body||''}</div>
      ${footer?`<div class="modal-foot">${footer}</div>`:''}
    </div>`;
  host.onclick = (e)=>{ if(e.target===host) closeModal(); };
}
function closeModal(){ const h=$('modalHost'); h.className='hidden'; h.innerHTML=''; h.onclick=null; }

/* ----- LOGIN SCREEN ------------------------------------------- */
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  $('staffForm').classList.toggle('hidden', tab!=='staff');
  $('supForm').classList.toggle('hidden', tab!=='supplier');
  $('staffErr').classList.add('hidden');
  $('supErr').classList.add('hidden');
}
function setBtnLoading(btn, loading, label){
  btn.disabled = loading;
  btn.innerHTML = loading
    ? '<span class="overlay-spinner" style="width:18px;height:18px;border-width:2.5px;margin:0"></span>กำลังดำเนินการ...'
    : '<span>'+esc(label)+'</span>';
}
async function handleGoogleLogin(response){
  if(!response || !response.credential){
    toast('ไม่ได้รับข้อมูลจาก Google กรุณาลองใหม่', 'error');
    return;
  }
  const err = $('staffErr'); err.classList.add('hidden');
  showOverlay('กำลังตรวจสอบสิทธิ์...');
  try{
    const res = await callAPI('login', {googleCredential: response.credential});
    if(!res || !res.success){
      err.textContent = (res && res.message) || 'เข้าสู่ระบบไม่สำเร็จ';
      err.classList.remove('hidden');
      return;
    }
    state.token = res.token;
    state.role  = res.role;
    state.name  = res.name;
    state.email = res.email || null;
    await enterApp();
  }catch(ex){
    err.textContent = 'เกิดข้อผิดพลาด: '+ex.message;
    err.classList.remove('hidden');
  }finally{
    hideOverlay();
  }
}
/* Expose globally so GSI data-callback can find it */
window.handleGoogleLogin = handleGoogleLogin;
async function handleSupplierLogin(e){
  e.preventDefault();
  const phone = $('inPhone').value.trim();
  const btn = $('supBtn');
  const err = $('supErr'); err.classList.add('hidden');
  setBtnLoading(btn, true);
  try{
    const res = await callAPI('login', {phone});
    if(!res || !res.success){
      err.textContent = (res && res.message) || 'เข้าสู่ระบบไม่สำเร็จ';
      err.classList.remove('hidden');
      return;
    }
    state.token = res.token; state.role = res.role; state.name = res.name;
    state.phone = res.phone; state.accounts = res.accounts || [];
    if(state.accounts.length > 1){
      setBtnLoading(btn, false, 'เข้าสู่ระบบด้วยเบอร์โทร');
      showAccountPicker();
      return;
    }
    state.selectedAccount = 'ALL';
    await enterApp();
  }catch(ex){
    err.textContent = 'เกิดข้อผิดพลาด: '+ex.message;
    err.classList.remove('hidden');
  }finally{
    setBtnLoading(btn, false, 'เข้าสู่ระบบด้วยเบอร์โทร');
  }
}
function showAccountPicker(){
  const list = state.accounts.map(a=>`
    <div class="acc-item" onclick="pickAccount('${esc(a.code)}')">
      <div class="ac-code">${esc(a.code)}</div>
      <div class="ac-name">${esc(a.name)}</div>
    </div>
  `).join('');
  showModal({
    title:'เลือก Supplier Account',
    body:`
      <p class="txt-small txt-soft mb-16">เบอร์โทรนี้ตรงกับ ${state.accounts.length} บริษัท กรุณาเลือก:</p>
      <div class="acc-list">
        <div class="acc-item selected" onclick="pickAccount('ALL')">
          <div class="ac-code">ดูทั้งหมด (${state.accounts.length} บัญชี)</div>
          <div class="ac-name">รวมทุกบริษัท — แนะนำสำหรับ Sale ที่ดูแลหลาย account</div>
        </div>
        ${list}
      </div>
    `
  });
}
async function pickAccount(code){
  state.selectedAccount = code;
  closeModal();
  await enterApp();
}

/* ----- APP ENTRY ---------------------------------------------- */
async function enterApp(){
  persistSession();
  $('loginScreen').classList.add('hidden');
  $('appShell').classList.remove('hidden');
  buildSidebar();
  await loadBootstrap();
  navigate(defaultPage());
}
function defaultPage(){
  if(state.role==='supplier') return 'dashboard';
  if(state.role==='gr') return 'calendar';
  return 'dashboard';
}
async function loadBootstrap(silent){
  showOverlay('กำลังเตรียมข้อมูล...');
  try{
    const res = await callAPI('bootstrap', state.token);
    if(!res || res.error){
      if(!silent) toast(res && res.error ? res.error : 'โหลดข้อมูลไม่สำเร็จ', 'error');
      return false;
    }
    state.user = res.user;
    /* Canonical source of truth for role/name (resume flow needs this) */
    if(res.user){
      state.role = res.user.role || state.role;
      state.name = res.user.name || state.name;
    }
    state.today = res.today;
    state.holidays = res.holidays || [];
    state.palettes = res.palettes || [];
    state.warehouses = res.warehouses || [];
    state.stats = res.stats || {};
    state.appointments = res.appointments || [];
    state.pos = res.pos || [];
    /* invalidate lazy caches */
    state.grRecords = null; state.customColumns = null; state.users = null; state.vendorMaster = null;
    /* sessionStorage cache for semi-static data */
    cacheSet(CACHE_KEYS.WAREHOUSES, state.warehouses);

    case 'my-appts':  return renderMyAppts(m);

    case 'vendors':   return renderVendors(m);
    case 'users':     return renderUsers(m);
    case 'holidays':  return renderHolidays(m);

/* Pure-CSS bar chart — no CDN needed.
   items = [{label, value, color}]
   Returns an HTML string.                    */
function buildBarChart(items, height){
  if(!items || !items.length)
    return '<p class="txt-mute txt-small txt-center" style="padding:16px">ไม่มีข้อมูล</p>';
  const h = height || 130;
  const maxVal = Math.max(...items.map(d=>d.value), 1);
  return '<div class="bar-chart">' +
    items.map(d=>{
      const barH = Math.max(Math.round(d.value/maxVal*(h-36)), d.value?4:0);
      const color = d.color || 'var(--navy)';
      return `<div class="bar-col">
        <span class="bc-val">${d.value}</span>
        <div class="bc-bar" style="height:${barH}px;background:${color}"></div>
        <span class="bc-lbl" title="${esc(d.label)}">${esc(d.label)}</span>
      </div>`;
    }).join('') + '</div>';
}

function renderCalendar(m){
  if(state.calYear === null){
    const d = new Date(state.today);
    state.calYear = d.getFullYear(); state.calMonth = d.getMonth();
  }
  m.innerHTML = `
    <div class="card card-gold">

          <h3>${esc(THAI_MONTHS[state.calMonth])} ${toBE(state.calYear)}</h3>
          <button class="btn btn-ghost btn-sm btn-icon" onclick="calNav(1)">›</button>
          <button class="btn btn-ghost btn-sm" onclick="calToday()">วันนี้</button>
        </div>
        <div class="table-wrap">
          <div class="cal">${buildCalendar()}</div>
        </div>
        <div class="mt-16 flex-wrap flex txt-small">
          <span class="badge badge-mute">คลัง:</span>
          <span class="badge" style="background:#E6F1FA;color:#2A7FC5">W1 สมุทรสงคราม</span>
          <span class="badge" style="background:#E8F5EE;color:#22A06B">W2 สุพรรณบุรี</span>
          <span class="badge" style="background:#F3E8F9;color:#8E44AD">W3 ราชบุรี</span>
          <span class="badge badge-navy">W4 นครปฐม</span>
          <span class="badge badge-gold">SM Ship To</span>
        </div>
      </div>
    </div>
  `;
}
function calNav(delta){
  state.calMonth += delta;
  if(state.calMonth < 0){ state.calMonth = 11; state.calYear--; }
  else if(state.calMonth > 11){ state.calMonth = 0; state.calYear++; }
  renderCalendar($('mainContent'));
}
function calToday(){
  const d = new Date(state.today);
  state.calYear = d.getFullYear(); state.calMonth = d.getMonth();
  renderCalendar($('mainContent'));
}
function buildCalendar(){
  const y = state.calYear, mo = state.calMonth;
  const first = new Date(y, mo, 1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y, mo+1, 0).getDate();
  const today = state.today;
  const holidays = new Set(state.holidays.map(h=>h.date));

  /* Pre-compute appts by date */
  const apptsByDate = {};
  (state.appointments||[]).forEach(a=>{
    if(!apptsByDate[a.Appt_Date]) apptsByDate[a.Appt_Date] = [];
    apptsByDate[a.Appt_Date].push(a);
  });

  let html = THAI_DAYS_SHORT.map(d=>`<div class="cal-day-name">${esc(d)}</div>`).join('');
  /* Leading blank cells */
  for(let i=0;i<startDow;i++){
    html += '<div class="cal-day other"></div>';
  }
  for(let d=1; d<=daysInMonth; d++){
    const iso = `${y}-${pad(mo+1)}-${pad(d)}`;
    const dow = new Date(y, mo, d).getDay();
    const cls = ['cal-day'];
    if(iso === today) cls.push('today');
    if(holidays.has(iso)) cls.push('holiday');
    if(dow === 0) cls.push('sunday');
    const list = apptsByDate[iso] || [];
    const events = list.slice(0,3).map(a=>{
      const evCls = a.Status === 'ยกเลิก' ? 'cancelled' : 'w-'+a.Warehouse;
      return `<span class="d-evt ${evCls}" onclick="showApptDetail('${esc(a.Appt_ID)}')" title="${esc(a.Warehouse)} ${fmtSlot(a.Time_Slot)} ${esc(a.Supplier_Name||'')}">
        ${fmtSlot(a.Time_Slot)} ${esc(a.Warehouse)}
      </span>`;
    }).join('');
    const more = list.length > 3 ? `<span class="d-evt" style="background:var(--text-soft);cursor:default">+${list.length-3} รายการ</span>` : '';
    html += `<div class="${cls.join(' ')}"><span class="d-num">${d}</span>${events}${more}</div>`;
  }
  return html;
}

async function submitGR(e, apptId){
  e.preventDefault();
  const form = e.target;
  const fd = new FormData(form);
  const appt = (state.appointments||[]).find(a=>a.Appt_ID === apptId);
  const customData = {};
  for(const [k,v] of fd.entries()){
    if(k.startsWith('c_')) customData[k.substring(2)] = v;
  }
  const payload = {
    apptId,
    supplierCodes: appt ? appt.Supplier_Codes : '',
    supplierName: appt ? appt.Supplier_Name : '',
    poIds: appt ? appt.PO_IDs : '',
    warehouse: appt ? appt.Warehouse : 'W4',
    driverFirstName: fd.get('driverFirstName'),
    driverLastName: fd.get('driverLastName'),
    driverPhone: fd.get('driverPhone'),
    driverIdCard: fd.get('driverIdCard')||'',
    palletPrice: Number(fd.get('palletPrice'))||0,
    palletCount: Number(fd.get('palletCount'))||0,
    unloadFee: Number(fd.get('unloadFee'))||0,
    filmFee: Number(fd.get('filmFee'))||0,
    receiver: fd.get('receiver'),
    startTime: fd.get('startTime'),
    endTime: fd.get('endTime')||'',
    notes: fd.get('notes')||'',
    custom: customData
  };
  showOverlay('กำลังบันทึก GR...');
  try{
    const res = await callAPI('createGRRecord', state.token, payload);
    if(res.error){ toast(res.error, 'error'); return; }
    toast('บันทึก GR สำเร็จ: '+res.id, 'success');
    closeModal();
    await loadBootstrap();
    navigate(state.currentPage);
  }catch(ex){
    toast('เกิดข้อผิดพลาด: '+ex.message, 'error');
  }finally{
    hideOverlay();
  }
}

/* Export current state.grRecords to Excel using SheetJS */
function exportGRExcel(){
  if(typeof XLSX === 'undefined'){
    toast('SheetJS ยังโหลดไม่เสร็จ กรุณารอสักครู่', 'warning');
    return;
  }
  const records = state.grRecords || [];
  if(!records.length){ toast('ไม่มีข้อมูลสำหรับ export', 'warning'); return; }

  /* Build worksheet rows */
  const headers = ['GR_ID','Created_At','Warehouse','Supplier_Name','Supplier_Codes','PO_IDs',
    'Driver_FirstName','Driver_LastName','Driver_Phone','Driver_ID_Card',
    'Pallet_Price','Pallet_Count','Pallet_Total','Unload_Fee','Film_Fee','Total_Cost',
    'Receiver','Start_Time','End_Time','Status','Notes','Created_By'];
  const rows = records.map(r=> headers.map(h=>r[h]||''));

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);

  /* Column widths */
  ws['!cols'] = headers.map(h=> ({ wch: Math.max(h.length, 14) }));

  XLSX.utils.book_append_sheet(wb, ws, 'GR Records');

  /* File name includes filter range */
  const from = grFilter.dateFrom || 'all';
  const to   = grFilter.dateTo   || 'all';
  const whTag = grFilter.warehouse || 'ALL';
  const fname = `GR_${whTag}_${from}_${to}.xlsx`;

  XLSX.writeFile(wb, fname);
  toast(`Export สำเร็จ: ${fname} (${records.length} รายการ)`, 'success');
}

  }catch(ex){ toast('เกิดข้อผิดพลาด: '+ex.message,'error'); hideOverlay(); }
}
async function addSuggestedHolidays(){
  const checked = Array.from(document.querySelectorAll('.hol-sug:checked'));
  if(!checked.length){ closeModal(); return; }
  closeModal();
  showOverlay('กำลังเพิ่ม '+checked.length+' รายการ...');
  try{
    for(const cb of checked){
      await callAPI('addHoliday', state.token, cb.dataset.date, cb.dataset.desc);
    }
    toast('เพิ่มวันหยุด '+checked.length+' รายการแล้ว', 'success');
    await loadBootstrap(); navigate(state.currentPage);
  }catch(ex){ toast('เกิดข้อผิดพลาด: '+ex.message,'error'); }
  finally{ hideOverlay(); }
}

   PALETTE PRICES (Admin)

function openPaletteForm(){

async function submitPalette(e){
  e.preventDefault();
  const fd = new FormData(e.target);

    closeModal();

async function deletePalette(row){

    const res = await callAPI('deletePalettePrice', state.token, row);
    if(res.error){ toast(res.error,'error'); return; }
    toast('ลบแล้ว','success');
    await loadBootstrap(); navigate(state.currentPage);
  }catch(ex){ toast('เกิดข้อผิดพลาด: '+ex.message,'error'); }

}

/* ===============================================================
   CUSTOM COLUMNS (Admin)
   =============================================================== */
async function renderCustomCol(m){
  m.innerHTML = `
    <div class="card card-gold">
      <div class="card-head">
        <h3>🧩 คอลัมน์เพิ่มเติม (GR Form)</h3>
        <button class="btn btn-gold btn-sm" onclick="openCustomColForm()">+ เพิ่มคอลัมน์</button>
      </div>
      <div class="card-body no-pad" id="ccBody">
        <div style="padding:20px"><div class="skel skel-row"></div><div class="skel skel-row"></div></div>
      </div>
    </div>
  `;
  try{
    if(!state.customColumns){
      const res = await callAPI('getCustomColumns', state.token);
      if(res.error){ toast(res.error,'error'); return; }
      state.customColumns = res.data || [];
    }
    const cols = state.customColumns;
    const body = $('ccBody');
    if(!cols.length){ body.innerHTML = '<div class="empty"><h4>ยังไม่มีคอลัมน์เพิ่มเติม</h4></div>'; return; }
    body.innerHTML = `
      <div class="table-wrap"><table class="tbl">
        <thead><tr><th>ID</th><th>ชื่อคอลัมน์</th><th>ประเภท</th><th>ตัวเลือก</th><th>บังคับ</th><th></th></tr></thead><tbody>
        ${cols.map(c=>`
          <tr>
            <td class="txt-small">${esc(c.Column_ID)}</td>
            <td class="txt-bold">${esc(c.Column_Name)}</td>
            <td><span class="badge badge-navy">${esc(c.Column_Type)}</span></td>
            <td class="txt-small">${esc(c.Options||'-')}</td>
            <td>${c.Required?'<span class="badge badge-warning">บังคับ</span>':'<span class="badge badge-mute">ไม่บังคับ</span>'}</td>
            <td class="actions"><button class="btn btn-danger btn-sm" onclick="deleteCustomCol(${c._row})">ลบ</button></td>
          </tr>
        `).join('')}
      </tbody></table></div>
    `;
  }catch(ex){
    $('ccBody').innerHTML = '<div class="form-error">เกิดข้อผิดพลาด: '+esc(ex.message)+'</div>';
  }
}
function openCustomColForm(){
  showModal({
    title:'+ เพิ่มคอลัมน์เพิ่มเติม',
    body:`
      <form id="ccForm" onsubmit="submitCustomCol(event)">
        <div class="form-group"><label class="form-label">ชื่อคอลัมน์ <span class="req">*</span></label><input class="form-input" name="name" required></div>
        <div class="form-group"><label class="form-label">ประเภท <span class="req">*</span></label>
          <select class="form-select" name="type" required onchange="document.getElementById('ccOpt').style.display = this.value==='select'?'':'none'">
            <option value="text">ข้อความ</option>
            <option value="number">ตัวเลข</option>
            <option value="select">Dropdown</option>
          </select>
        </div>
        <div class="form-group" id="ccOpt" style="display:none"><label class="form-label">ตัวเลือก (คั่นด้วย ,)</label><input class="form-input" name="options" placeholder="เช่น: แห้ง, แช่เย็น, แช่แข็ง"></div>
        <div class="form-group"><label class="form-label flex"><input type="checkbox" name="required" style="width:16px;height:16px;margin-right:6px"> บังคับกรอก</label></div>
      </form>
    `,
    footer:`
      <button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="document.getElementById('ccForm').requestSubmit()">บันทึก</button>
    `
  });
}
async function submitCustomCol(e){
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = {
    name: fd.get('name'),
    type: fd.get('type'),
    options: fd.get('options')||'',
    required: fd.get('required') === 'on'
  };
  showOverlay('กำลังบันทึก...');
  try{
    const res = await callAPI('addCustomColumn', state.token, payload);
    if(res.error){ toast(res.error,'error'); return; }
    toast('เพิ่มคอลัมน์แล้ว','success');
    closeModal();
    state.customColumns = null;
    renderCustomCol($('mainContent'));
  }catch(ex){ toast('เกิดข้อผิดพลาด: '+ex.message,'error'); }
  finally{ hideOverlay(); }
}
async function deleteCustomCol(row){
  if(!confirm('ยืนยันการลบ?')) return;
  showOverlay('กำลังลบ...');
  try{
    const res = await callAPI('deleteCustomColumn', state.token, row);
    if(res.error){ toast(res.error,'error'); return; }
    toast('ลบแล้ว','success');
    state.customColumns = null;
    renderCustomCol($('mainContent'));
  }catch(ex){ toast('เกิดข้อผิดพลาด: '+ex.message,'error'); }
  finally{ hideOverlay(); }
}

/* ===============================================================
   SETTINGS (Admin) — LINE Notify + Session Cleanup
   =============================================================== */
async function renderSettings(m){
  m.innerHTML = `
    <div class="grid" style="gap:20px">

      <!-- LINE Notify card -->
      <div class="card card-gold">
        <div class="card-head">
          <h3>🔔 LINE Notify</h3>
          <span class="badge badge-mute" id="lineStatusBadge">กำลังตรวจสอบ...</span>
        </div>
        <div class="card-body">
          <p class="txt-small txt-soft mb-16">
            แจ้งเตือนไปยัง LINE Group เมื่อ Supplier จองเวลาใหม่
            Token ได้จาก <a href="https://notify-bot.line.me/my/" target="_blank">notify-bot.line.me</a>
            (ฟรี ไม่มีค่าใช้จ่าย)
          </p>
          <div class="form-group">
            <label class="form-label">LINE Notify Token</label>
            <input class="form-input" type="password" id="lineTokenInput" placeholder="วาง token ที่นี่...">
            <p class="form-hint">Token จะถูกเก็บ server-side (PropertiesService) — ไม่แสดงใน UI</p>
          </div>
          <div class="flex flex-wrap" style="gap:10px">
            <button class="btn btn-primary" onclick="saveLineToken()">💾 บันทึก Token</button>
            <button class="btn btn-ghost" onclick="testLine()">📨 ทดสอบส่ง</button>
          </div>
          <div id="lineMsg" class="mt-8"></div>
        </div>
      </div>

      <!-- Session Cleanup card -->
      <div class="card card-gold">
        <div class="card-head">
          <h3>🧹 Session Cleanup</h3>
        </div>
        <div class="card-body">
          <p class="txt-small txt-soft mb-16">
            ลบ session token ที่หมดอายุออกจาก Sessions sheet
            ระบบจะทำโดยอัตโนมัติทุกวัน 02:00 หากตั้ง trigger แล้ว
          </p>
          <div class="flex flex-wrap" style="gap:10px">
            <button class="btn btn-primary" onclick="doCleanup()" id="btnCleanup">
              🧹 ล้าง Session หมดอายุ
            </button>
          </div>
          <div id="cleanupMsg" class="mt-8"></div>
          <div class="mt-16 card" style="background:var(--info-bg);border:none;padding:14px 16px;box-shadow:none">
            <p class="txt-small" style="color:var(--info)">
              <b>วิธีตั้ง Daily Trigger:</b><br>
              1. เปิด Apps Script Editor → Extensions > Apps Script<br>
              2. เรียก function <code>createCleanupTrigger()</code> ใน editor<br>
              3. Trigger จะรันทุกวัน 02:00 โดยอัตโนมัติ
            </p>
          </div>
        </div>
      </div>

    </div>
  `;

  /* Load LINE status */
  try{
    const res = await callAPI('getLineNotifyStatus', state.token);
    const badge = $('lineStatusBadge');
    if(badge){
      if(res && res.configured){
        badge.className = 'badge badge-success';
        badge.textContent = 'ตั้งค่าแล้ว (' + esc(res.tokenHint||'***') + ')';
      } else {
        badge.className = 'badge badge-danger';
        badge.textContent = 'ยังไม่ได้ตั้งค่า';
      }
    }
  }catch(_){}
}

async function saveLineToken(){
  const inp = $('lineTokenInput');
  const msg = $('lineMsg');
  if(!inp || !inp.value.trim()){ if(msg) msg.innerHTML='<span class="form-error">กรุณากรอก token</span>'; return; }
  showOverlay('กำลังบันทึก...');
  try{
    const res = await callAPI('setLineNotifyToken', state.token, inp.value.trim());
    if(res.error){ if(msg) msg.innerHTML='<span class="form-error">'+esc(res.error)+'</span>'; return; }
    toast('บันทึก LINE Token แล้ว', 'success');
    inp.value = '';
    renderSettings($('mainContent'));
  }catch(ex){ if(msg) msg.innerHTML='<span class="form-error">'+esc(ex.message)+'</span>'; }
  finally{ hideOverlay(); }
}

async function testLine(){
  const msg = $('lineMsg');
  showOverlay('กำลังส่งทดสอบ...');
  try{
    const res = await callAPI('testLineNotify', state.token);
    hideOverlay();
    if(res.error){
      if(msg) msg.innerHTML='<div class="form-error mt-8">'+esc(res.error)+'</div>';
    } else {
      toast('ส่ง LINE Notify สำเร็จ! ตรวจสอบ LINE Group ครับ', 'success');
      if(msg) msg.innerHTML='<div class="badge badge-success mt-8">ส่งสำเร็จ</div>';
    }
  }catch(ex){ hideOverlay(); if(msg) msg.innerHTML='<span class="form-error">'+esc(ex.message)+'</span>'; }
}

async function doCleanup(){
  const btn = $('btnCleanup');
  const msg = $('cleanupMsg');
  if(btn){ btn.disabled=true; btn.textContent='กำลังล้าง...'; }
  try{
    const res = await callAPI('cleanupSessions', state.token);
    if(res.error){ if(msg) msg.innerHTML='<span class="form-error">'+esc(res.error)+'</span>'; return; }
    const n = res.deleted || 0;
    toast('ล้าง session หมดอายุแล้ว: '+n+' รายการ', 'success');
    if(msg) msg.innerHTML=`<div class="badge badge-success mt-8">ลบ ${n} expired session${n!==1?'s':''}</div>`;
  }catch(ex){ if(msg) msg.innerHTML='<span class="form-error">'+esc(ex.message)+'</span>'; }
  finally{ if(btn){ btn.disabled=false; btn.textContent='🧹 ล้าง Session หมดอายุ'; } }
}

/* ===============================================================
   LOGOUT
   =============================================================== */
async function handleLogout(){
  if(!confirm('ต้องการออกจากระบบหรือไม่?')) return;
  try{ await callAPI('logout', state.token); }catch(_){}
  clearSession();
  try{ sessionStorage.clear(); }catch(_){}
  try{
    if(typeof google !== 'undefined' && google.accounts && google.accounts.id){
      google.accounts.id.disableAutoSelect();
    }
  }catch(_){}
  location.reload();
}

   INIT
   =============================================================== */
document.addEventListener('DOMContentLoaded', ()=>{
  /* Auto-normalize phone input (remove any non-digit / non-plus chars) */
  const phoneInput = $('inPhone');
  if(phoneInput){
    phoneInput.addEventListener('input', (e)=>{
      e.target.value = e.target.value.replace(/[^\d+]/g,'');
    });
  }
  /* Try to auto-resume session from localStorage — skips login screen if token valid */
  tryResumeSession();
});
</script>
